body:
  text: 散見簡牘合輯湖北江陵鳳凰山十號漢墓木牘竹簡竹笥二望笥一函一大奴一人大婢二人卑一具尺卑一具會卑一具食檢一具櫝一具小于一具案一布橐食一縑橐米二布帷一長丈四二福瓦器凡十三物脯二束豚一柯一具赤杯三具黑杯五酒二斗一四年後九月辛亥平里五大夫倀偃地下偃衣器物所以器物令以律令從事載翁仲七十王翁季五十楊公子𠦜莊伯五十胡兄五十靳悍𠦜小伯五十袁兄五十張父𠦜翁仲五十氾氏五十陶仲五十姚季五十王它五十張母𠦜張蒼𠦜不予者陳黑宋則齊中舨共侍約三月辛卯中舨舨長張伯兄秦仲陳伯等七人相與為舨約入舨錢二百約二會錢備不備勿與同舨即舨直行共侍非前謁病不行者罰日卅毋人者以庸賈器物不具物責十錢共事已器物毀傷之及亡舨共負之非其器物擅取之罰百錢舨吏令會不會會日罰五十會而計不具者罰比不會為舨吏器物及人舨吏李仲市陽二月百一十二算算卅五錢三千九百廿正偃付西鄉偃佐纏吏奉卩受正二百𠦜八市陽二月百一十二算算十錢千一百廿正偃付西鄉佐賜口錢卩市陽二月百一十二算算八錢八百九十六正偃付西鄉偃佐纏傳送卩市陽三月百九算算九錢九百八十一正偃付西鄉偃佐賜市陽三月百九算算廿六錢二千八百卅四正偃付西鄉偃佐賜市陽三月百九算算八錢八百七十二正偃付西鄉偃佐賜市陽四月百九算算廿六錢二千八百卅四正偃付西鄉偃佐賜市陽四月百九算算八錢八百七十二正偃付西鄉偃佐賜市陽四月百九算算九錢九百八十一正偃付西鄉偃佐賜市陽四月百九算算九錢九百八十一正偃付西鄉偃佐賜四月五千六百六十八市陽五月百九算算九錢九百八十一正偃付西鄉佐市陽五月百九算算廿六錢二千八百卅四正偃付西鄉佐市陽五月百九算算八錢八百七十二正偃付西鄉佐五月四千六百八十七市陽六月百廿算算卅六錢四千三百廿付得奴鄭里二月七十二算算卅五錢二千五百廿正偃付西鄉偃佐纏吏奉卩鄭里二月七十二算算八錢五百七十六正偃付西鄉佐佐纏傳送卩鄭里二月七十二算算十錢七百廿正偃付西鄉佐賜錢卩當利正月定算百一十五正月算𠦜二給轉費卩正月算十四吏奉卩正月算十三吏奉卩正月算傳送部正月算卩當利二月定算百二月算十四吏奉卩二月算十三吏奉卩二月算廿繕兵卩三月算十四吏奉卩三月算十三吏奉卩三月算六傳送芻二石為錢平里戶芻廿七石田芻四石三斗七升凡卅一石三斗七升八斗為錢六石當稿定廿四石六斗九升當田稿二石二斗四升半芻為稿十二石凡十四石二斗八升半稿上戶芻十三石田芻一石六斗六升凡十四石六斗六升二斗為錢一石當稿定十三石四斗六升給當田稿八斗三升芻為稿二石凡二石八斗三升市陽租五十三石三斗六升其六石一升當物其一斗大半當麥其七升半當其一石一斗二升當秏其四石五斗二升當黃白術凡十一石八斗三升定𠦜石五斗三升半監白稻米六升麥七黍七斗四升秶𥡘米秶大半秶白粟二稻米二斗四升大半升當八少半稻𥡘一斗四升少半八升大半升青米四鄭里稟簿凡六十一石七斗戶人聖能田一人口一人田八畝移越人戶貸八斗二年四月乙戶人𤙰能田一人口三人田十畝十卩貸一石戶人擊牛能田二人口四人田十二畝十卩貸一石二斗戶人野能田四人口八人田十五畝十卩貸一石五斗戶人厭冶能田二人口二人田十八畝十卩貸一石八斗戶人能田二人口三人田廿畝今奴貸二石戶人立能田二人口六人田廿三畝十卩貸二石三斗戶人越人能田三人口六人田卅畝十卩貸三石戶人不章能田四人口七人田卅畝十卩貸三石七斗戶人勝能田三人口五人田五十四畝十卩貸五石四斗戶人虜能田二人口四人田廿畝十卩貸二石戶人𥢢能田二人口六人田廿畝十卩貸二石戶人小奴能田二人口三人田卅畝十卩貸三石一石五戶人能田三人口四人田廿畝十卩貸二石戶人定能田四人口四人田卅畝十卩貸三石戶人青肩能田三人口六人廿七畝十卩貸二石七斗戶人奴能田四人口七人田廿三畝十卩貸二石三斗戶人奴能田三人口人田𠦜畝十卩貸四石戶人能田四人口六人田卅三畝十卩貸三石三斗戶人公士田能田三人口六人田廿一畝十卩貸二石一斗戶人駢能田四人口五人田卅畝十戶人朱市人能田三人口四人田卅畝戶人奴能田三人口三人田四畝戶人能田二人口三人田廿畝十戶人公士市人能田三人口四人田卅二畝鄧得二任甲二宋則二野人四凡十算徙一男一女男野人女惠寄三一一張母三夏幸一徙一男一女男毋邛女一姚三三三凡十算徙一男一女男孝女掾晨一說一不害二三三凡十算徙一男一女男女辯四倀伯三翁一楊二凡十算徙一男一女男慶女期三黑一婢一宋上一𢙘二除二凡十算徙一男一女男期女方涓二多一毋寇三壯四凡十算徙一男一女男女二則一徙一男一女男靳一是二四凡十男女人市陽戶倉書郭乙二戶儋行少一日寇都二戶兼行少一日昆論二戶善行少一日越人二戶唐行少一日上官巴人聖二戶青舒少一日貞二戶一日安國臣二戶赤行終古斯二戶已行臣二戶行首右革二戶在子行從二戶行任但二戶行二戶澤儋宇二戶廆狀小奴樹行成平中章見楊人郭貞王大女楊凡女延楊閬小小小毋智駒楊毋智楊累王終古王聖郭脩倀母訾倀奴倀時倀徐朿杜留朱但厭樂來黃澤之毋戍都敬歐婧喜易田益送四月丁巳撩甲人舍平里酒二石四斗直斗直九十八新一束四四月丁巳石伯里二百八十六月十六日丁卯决鄉至十月十日凡三月廿三日所出凡千八百八陽假千八百廿還九百廿六千六百九十八平里五十三里錢二千九百卅二受敬里錢三百十六廿移宣三百七十六里三百移至千二百給百五十六六月廿二日付二鈞二百五十一凡五百二六月廿五日付五翁伯緯二百將直百𠦜七月四日付五翁伯枲一唐卅笥三合五十四直百六十四七月十六日付司馬伯枲一唐卅二八日十三日付與司馬伯分二唐卅八直七十六九月一日笥六合五十四直三百廿四九月七日付五翁伯笥二合五十四直百八九月九日付五翁伯笥二合五十直百枲一唐卅凡百卅九月十三日付笥二合五十四直百八九月十五日付司笥二合五十四直百八枲四絜七直廿八凡百卅六九月五十四凡百八十月七日付五絜四凡廿
